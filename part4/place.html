<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HBnB — Place Details</title>
    <link rel="stylesheet" href="styles.css">
    <!-- No JavaScript for this static version -->
  </head>
  <body>
    <header>
      <div>
  <img class="logo" src="images/logo.png" alt="HBnB logo">
      </div>
      <nav>
        <a href="index.html">Home</a>
        <a href="login.html" class="login-button">Login</a>
      </nav>
    </header>

    <main>
      <section class="place-details">
        <!-- Dynamic place details will be injected here by scripts/place.js -->
        <div id="place-details" class="place-info"></div>

        <!-- Add review area; scripts/place.js will show/hide this based on auth -->
        <aside id="add-review">
          <a id="add-review-link" class="details-button" href="add_review.html">Add a review</a>
        </aside>
      </section>
    </main>

    <footer>
      <p>All rights reserved.</p>
    </footer>

    <!-- scripts: config must load before place.js -->
    <script src="scripts/config.js"></script>
    <script src="scripts/place.js"></script>
  </body>
</html>
